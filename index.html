<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全商情報1級 用語マスター</title>
    <style>
        :root { --primary-color: #007bff; --bg-color: #f0f2f5; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background: var(--bg-color); margin: 0; padding: 20px; }
        h2 { color: #333; margin-bottom: 10px; }
        
        /* 進捗バー */
        .progress-container { width: 100%; max-width: 400px; background: #ddd; height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary-color); width: 0%; transition: width 0.3s; }

        /* カードデザイン */
        .card-container { perspective: 1000px; width: 90vw; max-width: 400px; height: 280px; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.flipped { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
                        display: flex; align-items: center; justify-content: center; padding: 25px; 
                        box-sizing: border-box; border-radius: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); text-align: center; overflow-y: auto; }
        .front { background: white; color: #333; font-weight: bold; border: 3px solid var(--primary-color); font-size: 1.4rem; }
        .back { background: var(--primary-color); color: white; transform: rotateY(180deg); font-size: 1.1rem; line-height: 1.6; }

        /* 操作パネル */
        .controls { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; }
        button { padding: 12px; border: none; border-radius: 8px; background: #444; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button.highlight { background: var(--primary-color); }
        .info { margin-top: 15px; color: #666; font-size: 0.9rem; }
    </style>
</head>

        let currentIndex = 0;

        function updateCard() {
            const card = document.getElementById('card');
            card.classList.remove('flipped');
            
            // プログレス更新
            const progress = ((currentIndex + 1) / termData.length) * 100;
            document.getElementById('progress-bar').style.width = progress + "%";
            document.getElementById('counter').innerText = `${currentIndex + 1} / ${termData.length}`;

            setTimeout(() => {
                document.getElementById('term-display').innerText = termData[currentIndex].term;
                document.getElementById('def-display').innerText = termData[currentIndex].def;
            }, 150);
        }

        function flipCard() { document.getElementById('card').classList.toggle('flipped'); }
        function nextCard() { currentIndex = (currentIndex + 1) % termData.length; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + termData.length) % termData.length; updateCard(); }
        function shuffleCards() {
            if(!confirm("順番をバラバラにしますか？")) return;
            termData.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            updateCard();
        }

        // キーボード操作
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") { flipCard(); e.preventDefault(); }
            if (e.code === "ArrowRight") nextCard();
            if (e.code === "ArrowLeft") prevCard();
        });

        updateCard();
